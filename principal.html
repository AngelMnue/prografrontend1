<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Principal</title>
    <style>
        :root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #3b82f6; --accent-hover: #2563eb; --text: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444; }
        body { background-color: var(--bg-main); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--bg-card); padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-top: 0; }
        .btn { width: 100%; padding: 0.75rem; border-radius: 6px; background: var(--accent); color: white; font-weight: bold; text-decoration: none; display: inline-block; box-sizing: border-box; margin-top: 0.5rem; transition: 0.2s; }
        .btn:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }
        .menu-actions { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Bienvenido, {{ nombre }}</h2>
        <p style="color: #94a3b8;">Sistema de Gestión Interna</p>
        
        <div class="menu-actions">
            <a href="{{ url_for('buscador') }}" class="btn">🔍 Ir al Buscador</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">🚪 Salir del Sistema</a>
        </div>
    </div>
</body>
</html>
