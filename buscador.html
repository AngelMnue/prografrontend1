<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Productos</title>
    <style>
        :root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444; }
        body { background-color: var(--bg-main); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--bg-card); padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; text-align: center;}
        input { flex: 1; padding: 0.75rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; }
        button { padding: 0.75rem 1.5rem; border: none; border-radius: 6px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        .btn { width: 100%; padding: 0.75rem; border-radius: 6px; color: white; font-weight: bold; text-decoration: none; display: inline-block; box-sizing: border-box; text-align: center; margin-top: 0.5rem; }
        .btn-secondary { background: #475569; }
        .btn-danger { background: var(--danger); }
        .result-box { margin-top: 1.5rem; padding: 1rem; background: #0f172a; border-radius: 8px; display: none; border-left: 4px solid #3b82f6;}
        .result-box h3 { margin-top: 0; color: #3b82f6;}
        .result-item { margin-bottom: 0.5rem; font-size: 0.95rem;}
        .result-label { font-weight: bold; color: #94a3b8;}
        .alert { background: rgba(239, 68, 68, 0.2); color: #f87171; padding: 0.75rem; border-radius: 6px; display: none; margin-bottom: 1rem; text-align: center;}
    </style>
</head>
<body>
    <div class="card">
        <h2>Buscador de Productos</h2>
        
        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
            <input type="text" id="codigoProducto" placeholder="Ingrese código (Ej: P001)" autocomplete="off">
            <button id="btnBuscar">Buscar</button>
        </div>

        <div id="errorBusqueda" class="alert"></div>

        <div id="resultado" class="result-box">
            <h3 id="resNombre"></h3>
            <div class="result-item"><span class="result-label">Categoría:</span> <span id="resCategoria"></span></div>
            <div class="result-item"><span class="result-label">Descripción:</span> <span id="resDescripcion"></span></div>
            <div class="result-item"><span class="result-label">Precio:</span> S/ <span id="resPrecio"></span></div>
            <div class="result-item"><span class="result-label">Stock Actual:</span> <span id="resStock"></span> u.</div>
        </div>

        <div style="margin-top: 2rem; border-top: 1px solid #334155; padding-top: 1rem;">
            <a href="{{ url_for('principal') }}" class="btn btn-secondary">⬅️ Regresar al Panel</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">Salir del Sistema</a>
        </div>
    </div>

    <script>
        document.getElementById('btnBuscar').addEventListener('click', async () => {
            const codigo = document.getElementById('codigoProducto').value.trim();
            const resBox = document.getElementById('resultado');
            const errorBox = document.getElementById('errorBusqueda');
            
            resBox.style.display = 'none';
            errorBox.style.display = 'none';

            if(codigo === "") {
                errorBox.textContent = "Por favor, ingrese un código válido.";
                errorBox.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('https://examenprograii.onrender.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codigo: codigo })
                });

                const data = await response.json();

                if (response.ok && data.encontrado) {
                    document.getElementById('resNombre').textContent = data.nombre;
                    document.getElementById('resCategoria').textContent = data.categoria;
                    document.getElementById('resDescripcion').textContent = data.descripcion;
                    document.getElementById('resPrecio').textContent = data.precio.toFixed(2);
                    document.getElementById('resStock').textContent = data.stock;
                    resBox.style.display = 'block';
                } else {
                    errorBox.textContent = data.msg || "Producto no encontrado.";
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = "Error de conexión.";
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
